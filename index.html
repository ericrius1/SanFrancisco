<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const read = new URLSearchParams(location.search).get("read") || "";
        const readingEntry = read === "bts" || read.startsWith("bts.");
        if (readingEntry) document.documentElement.classList.add("reading-entry");

        // Normal visits retain the earliest possible city prefetch. A reading
        // entry calls this only after its selected chapter has painted.
        window.__sfStartPrefetch = () => {
          if (window.__sfPrefetch) return;
          const cover = document.createElement("link");
          cover.rel = "preload";
          cover.href = "/ui/san-francisco-survey-map.webp";
          cover.as = "image";
          cover.type = "image/webp";
          document.head.appendChild(cover);
          window.__sfPrefetch = Object.fromEntries(
            ["/data/meta.json","/data/heightmap.bin","/data/surface.bin","/data/groundtop-delta.bin","/data/manifest.json"].map((u) => [u, fetch(u)])
          );
        };
        if (!readingEntry) window.__sfStartPrefetch();
      })();
    </script>
    <title>San Francisco - main</title>
    <link
      rel="preload"
      href="/fonts/Newsreader-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Newsreader-VariableItalic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>"
    />
    <style>

      /* ============================================================
         DESIGN TOKENS — shared period typography with solid navy
         surfaces for live gameplay. Self-hosted font (offline; no CDN),
         semantic colors, radii, elevation, motion, and one z-index scale.
         ============================================================ */
      @font-face {
        font-family: "Newsreader";
        font-style: normal;
        font-weight: 200 800;
        font-display: swap;
        src: url("/fonts/Newsreader-Variable.woff2") format("woff2-variations");
      }
      @font-face {
        font-family: "Newsreader";
        font-style: italic;
        font-weight: 200 800;
        font-display: swap;
        src: url("/fonts/Newsreader-VariableItalic.woff2") format("woff2-variations");
      }
      :root {
        /* type */
        --font: "Newsreader", "Iowan Old Style", "Palatino Linotype", Palatino,
          Georgia, serif;
        --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;

        /* accent — teal → mint */
        --accent: #6fd7c4;
        --accent-strong: #9ef2df;
        --accent-line: rgba(111, 215, 196, 0.42);
        --accent-soft: rgba(111, 215, 196, 0.16);
        --accent-glow: rgba(111, 215, 196, 0.6);
        --on-accent: #06202c;

        /* text ramp (bright → muted) */
        --text: #eaf4f8;
        --text-soft: #dceff5;
        --text-dim: #bcd9e6;
        --text-mut: #9fc6d6;

        /* status */
        --danger: #f07f72;
        --danger-strong: #ffb0a6;
        --warn: #f2b96f;
        --warn-strong: #ffdca8;

        /* solid navy surfaces behind HUD text */
        --surface: #0a1824;
        --surface-strong: #0a1824;
        --surface-raised: #122838;
        --surface-sunken: #061019;
        --scrim: rgba(4, 10, 16, 0.5);

        /* hairlines */
        --hairline: rgba(190, 225, 240, 0.14);
        --hairline-2: rgba(190, 225, 240, 0.22);
        --hairline-strong: rgba(190, 225, 240, 0.35);

        /* radii */
        --r-xs: 4px;
        --r-sm: 7px;
        --r-md: 10px;
        --r-lg: 12px;
        --r-xl: 16px;
        --r-pill: 999px;

        /* elevation */
        --shadow-sm: 0 6px 18px rgba(0, 6, 12, 0.28);
        --shadow-md: 0 10px 28px rgba(0, 6, 12, 0.3);
        --shadow-lg: 0 24px 70px rgba(0, 4, 10, 0.6);
        --edge-hi: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        --blur: 6px;
        --blur-strong: 8px;

        /* motion — brief, ease-out for state changes */
        --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
        --dur: 0.18s;
        --dur-slow: 0.32s;

        /* z-index scale — single source of truth, wide gaps.
           --z-debug mirrors src/ui/debug.ts (owned by another pass). */
        --z-underwater: 1;
        --z-hud-base: 1;
        --z-hud-raised: 2;
        --z-hud-top: 3;
        --z-panel: 8;
        --z-loading: 20;
        --z-map: 30;
        --z-debug: 40;
        --z-overlay: 50;
        --z-modal: 60;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1520;
        font-family: var(--font);
        font-optical-sizing: auto;
      }
      button,
      input,
      textarea,
      select {
        font-family: inherit;
      }
      #app {
        position: fixed;
        inset: 0;
        transition: opacity 0.5s ease;
      }
      /* While a full reading overlay (Behind the scenes, the museum book) is open,
         the world canvas is HIDDEN entirely — not merely dimmed — so nothing
         composites or gets sampled behind the modal. A translucent backdrop-filter
         over a live WebGPU canvas flickers in Chrome even when the render loop is
         frozen; taking the canvas out of the compositor is the only robust fix. The
         page's solid #0b1520 background shows through instead, and the world render
         itself freezes (see the reading-overlay guard in tick). */
      #app.world-dimmed canvas {
        visibility: hidden;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: var(--font);
        font-optical-sizing: auto;
        color: var(--text);
        text-shadow: 0 1px 3px rgba(0, 10, 20, 0.8);
      }
      /* one keyboard-focus recipe for every interactive control in the UI */
      #hud button:focus-visible,
      #hud input:focus-visible,
      #hud [tabindex]:focus-visible,
      .bigmap button:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 2px;
      }
      /* honor reduced-motion: keep state changes instant, drop the flourishes */
      @media (prefers-reduced-motion: reduce) {
        #hud *,
        #loading *,
        .bigmap * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
      #hud .br-stack {
        position: absolute;
        bottom: 16px;
        right: 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        max-width: 420px;
      }
      /* .help is just a positioning context anchored (via .br-stack) to the
         bottom-right. It shrinks to the handle: the fold-out panel is absolutely
         positioned so it never enlarges the handle's footprint. */
      #hud .help {
        position: relative;
        display: inline-flex;
        flex-direction: column;
        align-items: flex-end;
        max-width: 420px;
        font-size: 12px;
        pointer-events: none;
      }
      /* The always-visible handle pill. Pinned bottom-right; never moves when the
         panel opens/closes — the panel folds out above it. */
      #hud .help .help-toggle {
        pointer-events: auto;
        cursor: pointer;
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border: 1px solid var(--hairline);
        border-radius: var(--r-md);
        background: var(--surface);
        box-shadow: var(--shadow-sm), var(--edge-hi);
        color: var(--text);
        font: 700 11px var(--font);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        opacity: 0.92;
        transition:
          opacity 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease;
      }
      #hud .help .help-toggle:hover {
        opacity: 1;
        color: var(--accent-strong);
        border-color: rgba(111, 215, 196, 0.5);
      }
      #hud .help .help-toggle-chevron {
        font-size: 10px;
        opacity: 0.75;
        transition: transform 0.2s ease;
      }
      /* Fold-out panel, floating just above the handle and right-aligned to it.
         Opens/closes with a ~600ms fold: grid-rows 1fr<->0fr animates to the
         content's natural height (no magic numbers), plus opacity + a small
         upward slide out of the handle. */
      #hud .help .help-body-wrap {
        pointer-events: auto;
        position: absolute;
        right: 0;
        bottom: calc(100% + 8px);
        display: grid;
        grid-template-rows: 1fr;
        /* size to content, not to the handle-width containing block (.help) */
        width: max-content;
        max-width: min(420px, calc(100vw - 40px));
        opacity: 1;
        transform-origin: bottom right;
        transition:
          grid-template-rows 600ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 360ms ease,
          transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      #hud .help .help-body-wrap > .help-body {
        /* the grid child must clip + allow 0 height for the fold to work */
        overflow: hidden;
        min-height: 0;
        max-width: 420px;
        padding: 10px 12px 12px;
        border-radius: var(--r-md);
        background: var(--surface);
        border: 1px solid var(--hairline);
        box-shadow: var(--shadow-sm), var(--edge-hi);
      }
      #hud .minigame-exit {
        order: 2;
        min-height: 44px;
        max-width: min(240px, calc(100vw - 40px));
        padding: 5px 12px 5px 9px;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        pointer-events: auto;
        cursor: pointer;
        border-radius: var(--r-md);
        border: 1px solid rgba(242, 185, 111, 0.68);
        background: linear-gradient(180deg, rgba(54, 35, 13, 0.96), rgba(32, 22, 11, 0.96));
        color: #ffe3b5;
        box-shadow: var(--shadow-sm), var(--edge-hi);
        text-align: left;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.72);
        transition:
          border-color var(--dur) var(--ease),
          background var(--dur) var(--ease),
          transform 0.12s var(--ease);
      }
      #hud .minigame-exit[hidden] {
        display: none;
      }
      #hud .minigame-exit:hover {
        border-color: #ffd08e;
        background: linear-gradient(180deg, rgba(70, 45, 15, 0.98), rgba(40, 27, 12, 0.98));
        transform: translateY(-1px);
      }
      #hud .minigame-exit:active {
        transform: translateY(0);
      }
      #hud .minigame-exit-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 30px;
        width: 30px;
        height: 30px;
        border-radius: 9px;
        background: rgba(242, 185, 111, 0.16);
        border: 1px solid rgba(242, 185, 111, 0.32);
        font-size: 18px;
      }
      #hud .minigame-exit-copy {
        min-width: 0;
        display: grid;
        gap: 1px;
      }
      #hud .minigame-exit-copy b,
      #hud .minigame-exit-copy small {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #hud .minigame-exit-copy b {
        font: 800 11.5px var(--font);
        letter-spacing: 0.015em;
      }
      #hud .minigame-exit-copy small {
        color: rgba(255, 227, 181, 0.72);
        font: 650 10px var(--font);
      }
      #hud .help.collapsed .help-body-wrap {
        grid-template-rows: 0fr;
        opacity: 0;
        transform: translateY(8px) scale(0.985);
        pointer-events: none;
      }
      /* movement grid + global shortcuts, side by side */
      #hud .help .cols {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      #hud .help .extras {
        padding-left: 15px;
        border-left: 1px solid var(--hairline);
        opacity: 0.72;
      }
      #hud .place-history {
        position: absolute;
        top: 16px;
        left: 272px;
        z-index: var(--z-hud-raised);
        display: inline-flex;
        gap: 7px;
        pointer-events: auto;
        user-select: none;
      }
      #hud .place-history .history-btn {
        pointer-events: auto;
        cursor: pointer;
        min-width: 92px;
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 11px;
        border-radius: 10px;
        background: var(--surface-strong);
        border: 1px solid rgba(111, 215, 196, 0.42);
        color: var(--accent-strong);
        font:
          800 11px var(--font);
        letter-spacing: 0.02em;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 6px 18px rgba(0, 6, 12, 0.28);
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s,
          transform 0.12s,
          opacity 0.15s;
      }
      #hud .place-history .history-btn:not(:disabled):hover {
        border-color: var(--accent-strong);
        color: var(--text);
        background: #164046;
        transform: translateY(-1px);
      }
      #hud .place-history .history-btn:disabled {
        cursor: default;
        opacity: 0.38;
        color: var(--text-dim);
        border-color: rgba(190, 225, 240, 0.2);
      }
      #hud .place-history .history-btn .hist-main {
        min-width: 42px;
        text-align: left;
      }
      #hud .place-history .history-btn .hist-keys {
        display: inline-flex;
        gap: 3px;
        opacity: 0.86;
      }
      @media (max-width: 620px) {
        #hud .br-stack {
          /* The compact toolbar spans the full bottom rail. Keep the help and
             minigame-exit controls one rail above it, including phone safe area. */
          bottom: calc(max(16px, env(safe-area-inset-bottom)) + 105px);
        }
        #hud .place-history {
          top: 266px;
          left: 20px;
          flex-direction: column;
        }
        #hud .place-history .history-btn {
          min-width: 112px;
        }
      }
      /* Tab toggles the user UI: panels fade out slowly, snap back quickly. */
      #hud .help,
      #hud .toolbar,
      #hud .audio,
      #hud .chat,
      #hud .minimap,
      #hud .place-history,
      #hud .avatar-ui,
      #hud .satchel,
      #hud .share-ui,
      #hud .tutorial-ui,
      #hud .tutorial-panel,
      #hud .links-ui,
      #hud .minigame-exit,
      #hud .player-locator {
        transition: opacity 0.35s ease;
      }
      #hud.faded .help,
      #hud.faded .toolbar,
      #hud.faded .audio,
      #hud.faded .chat,
      #hud.faded .minimap,
      #hud.faded .place-history,
      #hud.faded .avatar-ui,
      #hud.faded .satchel,
      #hud.faded .share-ui,
      #hud.faded .tutorial-ui,
      #hud.faded .tutorial-panel,
      #hud.faded .links-ui,
      #hud.faded .minigame-exit,
      #hud.faded .player-locator {
        opacity: 0;
        transition: opacity 1s ease;
      }
      #hud.faded .help,
      #hud.faded .toolbar,
      #hud.faded .audio,
      #hud.faded .chat,
      #hud.faded .minimap,
      #hud.faded .place-history,
      #hud.faded .avatar-ui,
      #hud.faded .share-ui,
      #hud.faded .tutorial-ui,
      #hud.faded .tutorial-panel,
      #hud.faded .links-ui,
      #hud.faded .minigame-exit {
        pointer-events: none;
      }
      /* Hard per-panel hide (hud.setPanelHidden / hud.soloPanel) — beats every
         panel's own open/show state; used for captures + debug. */
      #hud .panel-hidden {
        display: none !important;
      }
      #hud .help.swap .help-body-wrap {
        animation: hudswap 0.28s ease;
      }
      @keyframes hudswap {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
      }
      #hud .help .grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 5px 11px;
        align-items: center;
      }
      #hud .help .grid .lbl {
        color: var(--text-dim);
      }
      #hud .help .grid .keys {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
      }
      #hud .help .k {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: var(--r-xs);
        background: linear-gradient(
          180deg,
          rgba(30, 54, 72, 0.85),
          var(--surface-raised)
        );
        border: 1px solid var(--hairline-strong);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 1px 1px rgba(0, 6, 12, 0.35);
        color: var(--text);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      #hud .help .k.f {
        border-radius: 50%;
        min-width: 17px;
        width: 17px;
        padding: 0;
        font-size: 10px;
      }
      #hud .help .k.fa {
        border-color: #7ed67e;
        color: #a5f0a5;
      }
      #hud .help .k.fb {
        border-color: #f07f72;
        color: #ffb0a6;
      }
      #hud .help .k.fx {
        border-color: #6aaaff;
        color: #a9ccff;
      }
      #hud .help .k.fy {
        border-color: #f2ce6b;
        color: #ffe6a3;
      }
      #hud .help .tip {
        margin-top: 8px;
        opacity: 0.7;
        font-style: italic;
        font-size: 11px;
        line-height: 1.4;
      }
      #hud .help .ui-bar {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px 12px;
        opacity: 0.72;
        font-size: 11px;
      }
      /* center event toast — solid banner that rises + fades on each message
         (hud.ts toggles .show); readable over bright or dark scenes */
      #hud .center {
        position: absolute;
        left: 50%;
        top: 50%;
        max-width: min(680px, 82vw);
        padding: 9px 18px;
        border-radius: var(--r-lg);
        background: #091622;
        border: 1px solid var(--hairline-2);
        box-shadow: var(--shadow-md), var(--edge-hi);
        font-size: 16px;
        font-weight: 600;
        line-height: 1.35;
        text-align: center;
        opacity: 0;
        transform: translate(-50%, -50%) translateY(9px);
        transition:
          opacity 0.2s var(--ease),
          transform 0.2s var(--ease);
      }
      #hud .center.show {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
      #hud .player-locator {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #hud .player-locator.empty {
        opacity: 0;
      }
      #hud .player-locator-marker {
        --hue: 180;
        --angle: 0rad;
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 96px;
        max-width: min(188px, 42vw);
        padding: 5px 8px 5px 5px;
        border-radius: 9px;
        transform: translate(-50%, -112%);
        background: #07121c;
        border: 1px solid hsla(var(--hue), 78%, 66%, 0.72);
        box-shadow:
          0 8px 20px rgba(0, 6, 12, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        color: var(--text);
      }
      #hud .player-locator-marker.edge {
        transform: translate(-50%, -50%);
        background: #091622;
      }
      #hud .player-locator-marker .pl-key {
        flex: 0 0 auto;
        min-width: 22px;
        height: 22px;
        padding: 0 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        background: hsl(var(--hue), 78%, 58%);
        color: #06131a;
        font:
          800 12px var(--font);
        text-shadow: none;
      }
      #hud .player-locator-marker .pl-body {
        min-width: 0;
        display: grid;
        gap: 1px;
      }
      #hud .player-locator-marker .pl-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font:
          800 11.5px var(--font);
      }
      #hud .player-locator-marker .pl-distance {
        color: var(--text-dim);
        opacity: 0.86;
        font: 700 10px var(--font);
        font-variant-numeric: tabular-nums;
      }
      #hud .player-locator-marker .pl-arrow {
        display: none;
        flex: 0 0 9px;
        width: 9px;
        height: 9px;
        border-top: 2px solid var(--text);
        border-right: 2px solid var(--text);
        transform: rotate(var(--angle));
        opacity: 0.86;
      }
      #hud .player-locator-marker.edge .pl-arrow {
        display: inline-block;
      }
      /* Full-width rail so the cluster can be centred, yet the flexible spacer
         pseudo-elements below keep it from ever sliding under the bottom-left
         audio panel: they grow equally (→ centred) until the left one hits its
         min-width floor, after which the cluster shifts right instead. */
      #hud .toolbar {
        position: absolute;
        bottom: 16px;
        left: 0;
        right: 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        pointer-events: none;
      }
      #hud .toolbar::before,
      #hud .toolbar::after {
        content: "";
        flex: 1 1 0;
      }
      #hud .toolbar::before {
        min-width: 250px;
      }
      #hud .toolbar::after {
        min-width: 16px;
      }
      /* vnav (↑/↓) + the stacked rows, sharing a left edge */
      #hud .toolbar .primary {
        display: flex;
        align-items: stretch;
        gap: 7px;
        flex: 0 0 auto;
        max-width: 100%;
        pointer-events: auto;
      }
      #hud .toolbar .stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        min-width: 0;
      }
      /* between-rows axis: hop focus up/down. Accent-tinted so it reads as a
         different axis from the neutral per-row ←/→ cycle hints. */
      #hud .toolbar .vnav {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
        align-self: stretch;
        gap: 6px;
        flex: 0 0 auto;
      }
      #hud .toolbar .vnav .vk {
        display: inline-flex;
        align-items: center;

      #loading {

      #loading::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, rgba(236, 223, 187, 0.04) 0 38%, rgba(64, 53, 37, 0.22) 100%),
          repeating-linear-gradient(0deg, rgba(69, 62, 44, 0.025) 0 1px, transparent 1px 4px),

          inset 0 0 0 1px rgba(57, 58, 45, 0.42),

        <div class="plate-number">City edition · 1776</div>
        <div class="title-eyebrow">A living atlas of</div>
        <h1><span>San</span><span>Francisco</span></h1>
        <div class="coordinates"><span>37° 46′ N · 122° 25′ W</span></div>
        <p class="start-lede" data-start-lede>Walk the hills. Follow the fog.<br />Make the city yours.</p>
        <script>
          (() => {
            const LEDE_LINES = [
              "Walk the hills",
              "Follow the fog",
              "Make the city yours",
              "Surf the waves",
              "Find the tea master",
              "Share tea with Hiro",
              "Wander the gardens",
              "Play pickleball",
              "Fly a kite on the sand",
              "Walk the labyrinth",
              "Rake the dry garden",
              "Sit in stillness",
              "Listen to the wind",
              "Name the wind",
              "Soak in Sutro",
              "Chase the afterlight",
              "Light the palace lamps",
              "Cross the Golden Gate",
              "Climb Corona Heights",
              "Become the phoenix",
              "Hunt for crabs",
              "Drift the lagoon",
              "Draw a bow in the park",
              "Fetch with the dogs",
              "Ride the hoverboard",
              "Watch the gulls wheel",
              "Trace the drum bridge",
              "Tee off in the Presidio",
              "Follow the buskers",
              "Sit with the koi",
              "Swim the bay",
              "Carve the fog line",
            ];
            const el = document.querySelector("[data-start-lede]");
            if (!el) return;
            const pool = LEDE_LINES.slice();
            for (let i = pool.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              const tmp = pool[i];
              pool[i] = pool[j];
              pool[j] = tmp;
            }
            const [a, b, c] = pool;
            el.innerHTML = `${a}. ${b}.<br />${c}.`;
          })();
        </script>
        <div class="loading-status" aria-live="polite">
          <div class="bar"><div data-loading-bar></div></div>
          <div data-loading-label></div>
        </div>
        <form class="start-form" data-start-form>
          <label for="traveler-name">Traveler’s name</label>
          <div class="form-row">
            <input
              id="traveler-name"
              data-name-input
              type="text"
              maxlength="20"
              autocomplete="off"
              spellcheck="false"
              autofocus
            />
            <button type="submit" disabled>Enter the city</button>
          </div>
        </form>
        <div class="start-hint">Keep the name we chose, or write your own.</div>
        <div class="controls-hint" aria-label="Essential controls">
          <div class="row"><span class="k">Tab</span><span>show or hide the folio</span></div>
          <div class="row"><span class="k">Esc</span><span>release the mouse</span></div>
          <div class="row"><span class="k">L</span><span>pointer lock / free cursor</span></div>
        </div>
        <div class="start-imprint">Pacific coast · A city in motion</div>
      </main>
    </div>
    <script type="module" src="/src/startup.ts"></script>
  </body>
</html>
