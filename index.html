<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>San Francisco</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>"
    />
    <style>

      /* ============================================================
         DESIGN TOKENS — one cohesive glassmorphism system.
         Self-hosted font (offline; no CDN), semantic colors, radii,
         elevation, motion, and a single z-index scale. Migrate values
         here rather than sprinkling literals.
         ============================================================ */
      @font-face {
        font-family: "InterVariable";
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url("/fonts/InterVariable.woff2") format("woff2");
      }
      :root {
        /* type */
        --font: "InterVariable", Inter, -apple-system, "SF Pro Text",
          "Segoe UI", Roboto, sans-serif;
        --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;

        /* accent — teal → mint */
        --accent: #6fd7c4;
        --accent-strong: #9ef2df;
        --accent-line: rgba(111, 215, 196, 0.42);
        --accent-soft: rgba(111, 215, 196, 0.16);
        --accent-glow: rgba(111, 215, 196, 0.6);
        --on-accent: #06202c;

        /* text ramp (bright → muted) */
        --text: #eaf4f8;
        --text-soft: #dceff5;
        --text-dim: #bcd9e6;
        --text-mut: #9fc6d6;

        /* status */
        --danger: #f07f72;
        --danger-strong: #ffb0a6;
        --warn: #f2b96f;
        --warn-strong: #ffdca8;

        /* translucent navy glass surfaces */
        --surface: rgba(10, 24, 36, 0.55);
        --surface-strong: rgba(10, 24, 36, 0.72);
        --surface-raised: rgba(18, 40, 56, 0.6);
        --surface-sunken: rgba(6, 16, 25, 0.6);
        --scrim: rgba(4, 10, 16, 0.5);

        /* hairlines */
        --hairline: rgba(190, 225, 240, 0.14);
        --hairline-2: rgba(190, 225, 240, 0.22);
        --hairline-strong: rgba(190, 225, 240, 0.35);

        /* radii */
        --r-xs: 4px;
        --r-sm: 7px;
        --r-md: 10px;
        --r-lg: 12px;
        --r-xl: 16px;
        --r-pill: 999px;

        /* elevation + glass */
        --shadow-sm: 0 6px 18px rgba(0, 6, 12, 0.28);
        --shadow-md: 0 10px 28px rgba(0, 6, 12, 0.3);
        --shadow-lg: 0 24px 70px rgba(0, 4, 10, 0.6);
        --edge-hi: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        --blur: 6px;
        --blur-strong: 8px;

        /* motion — brief, ease-out for state changes */
        --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
        --dur: 0.18s;
        --dur-slow: 0.32s;

        /* z-index scale — single source of truth, wide gaps.
           --z-debug mirrors src/ui/debug.ts (owned by another pass). */
        --z-underwater: 1;
        --z-hud-base: 1;
        --z-hud-raised: 2;
        --z-hud-top: 3;
        --z-panel: 8;
        --z-loading: 20;
        --z-map: 30;
        --z-debug: 40;
        --z-overlay: 50;
        --z-modal: 60;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1520;
      }
      #app {
        position: fixed;
        inset: 0;
        transition: opacity 0.5s ease;
      }
      /* while a reading overlay is open the world stops rendering entirely and
         the frozen canvas dims a touch — no live frames flicker through. */
      #app.world-dimmed {
        opacity: 0.45;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: var(--font);
        color: var(--text);
        text-shadow: 0 1px 3px rgba(0, 10, 20, 0.8);
      }
      /* one keyboard-focus recipe for every interactive control in the UI */
      #hud button:focus-visible,
      #hud input:focus-visible,
      #hud [tabindex]:focus-visible,
      .bigmap button:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 2px;
      }
      /* honor reduced-motion: keep state changes instant, drop the flourishes */
      @media (prefers-reduced-motion: reduce) {
        #hud *,
        #loading *,
        .bigmap * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
      #hud .br-stack {
        position: absolute;
        bottom: 16px;
        right: 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        max-width: 420px;
      }
      #hud .help {
        max-width: 420px;
        font-size: 12px;
        opacity: 0.92;
        padding: 12px 14px;
        border-radius: var(--r-md);
        background: var(--surface);
        border: 1px solid var(--hairline);
        box-shadow: var(--shadow-sm), var(--edge-hi);
        backdrop-filter: blur(var(--blur));
        /* bottom-anchored panel grows upward — cap it so short viewports scroll
           inside the panel instead of pushing rows off the top of the screen */
        max-height: calc(100dvh - 58px);
        overflow-y: auto;
        overscroll-behavior: contain;
      }
      /* movement grid + global shortcuts, side by side */
      #hud .help .cols {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      #hud .help .extras {
        padding-left: 15px;
        border-left: 1px solid var(--hairline);
        opacity: 0.72;
      }
      #hud .place-history {
        position: absolute;
        top: 16px;
        left: 272px;
        z-index: var(--z-hud-raised);
        display: inline-flex;
        gap: 7px;
        pointer-events: auto;
        user-select: none;
      }
      #hud .place-history .history-btn {
        pointer-events: auto;
        cursor: pointer;
        min-width: 92px;
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 11px;
        border-radius: 10px;
        background: var(--surface-strong);
        border: 1px solid rgba(111, 215, 196, 0.42);
        color: var(--accent-strong);
        font:
          800 11px var(--font);
        letter-spacing: 0.02em;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 6px 18px rgba(0, 6, 12, 0.28);
        backdrop-filter: blur(6px);
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s,
          transform 0.12s,
          opacity 0.15s;
      }
      #hud .place-history .history-btn:not(:disabled):hover {
        border-color: var(--accent-strong);
        color: var(--text);
        background: rgba(22, 64, 70, 0.62);
        transform: translateY(-1px);
      }
      #hud .place-history .history-btn:disabled {
        cursor: default;
        opacity: 0.38;
        color: var(--text-dim);
        border-color: rgba(190, 225, 240, 0.2);
      }
      #hud .place-history .history-btn .hist-main {
        min-width: 42px;
        text-align: left;
      }
      #hud .place-history .history-btn .hist-keys {
        display: inline-flex;
        gap: 3px;
        opacity: 0.86;
      }
      @media (max-width: 620px) {
        #hud .place-history {
          top: 266px;
          left: 20px;
          flex-direction: column;
        }
        #hud .place-history .history-btn {
          min-width: 112px;
        }
      }
      /* Tab toggles the user UI: panels fade out slowly, snap back quickly. */
      #hud .help,
      #hud .toolbar,
      #hud .audio,
      #hud .chat,
      #hud .minimap,
      #hud .place-history,
      #hud .avatar-ui,
      #hud .satchel,
      #hud .share-ui,
      #hud .tutorial-ui,
      #hud .tutorial-panel,
      #hud .links-ui,
      #hud .player-locator {
        transition: opacity 0.35s ease;
      }
      #hud.faded .help,
      #hud.faded .toolbar,
      #hud.faded .audio,
      #hud.faded .chat,
      #hud.faded .minimap,
      #hud.faded .place-history,
      #hud.faded .avatar-ui,
      #hud.faded .satchel,
      #hud.faded .share-ui,
      #hud.faded .tutorial-ui,
      #hud.faded .tutorial-panel,
      #hud.faded .links-ui,
      #hud.faded .player-locator {
        opacity: 0;
        transition: opacity 1s ease;
      }
      #hud.faded .toolbar,
      #hud.faded .audio,
      #hud.faded .chat,
      #hud.faded .minimap,
      #hud.faded .place-history,
      #hud.faded .avatar-ui,
      #hud.faded .share-ui,
      #hud.faded .tutorial-ui,
      #hud.faded .tutorial-panel,
      #hud.faded .links-ui {
        pointer-events: none;
      }
      #hud .help.swap {
        animation: hudswap 0.28s ease;
      }
      @keyframes hudswap {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
      }
      #hud .help .grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 5px 11px;
        align-items: center;
      }
      #hud .help .grid .lbl {
        color: var(--text-dim);
      }
      #hud .help .grid .keys {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
      }
      #hud .help .k {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: var(--r-xs);
        background: linear-gradient(
          180deg,
          rgba(30, 54, 72, 0.85),
          var(--surface-raised)
        );
        border: 1px solid var(--hairline-strong);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 1px 1px rgba(0, 6, 12, 0.35);
        color: var(--text);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1;
      }
      #hud .help .k.f {
        border-radius: 50%;
        min-width: 17px;
        width: 17px;
        padding: 0;
        font-size: 10px;
      }
      #hud .help .k.fa {
        border-color: #7ed67e;
        color: #a5f0a5;
      }
      #hud .help .k.fb {
        border-color: #f07f72;
        color: #ffb0a6;
      }
      #hud .help .k.fx {
        border-color: #6aaaff;
        color: #a9ccff;
      }
      #hud .help .k.fy {
        border-color: #f2ce6b;
        color: #ffe6a3;
      }
      #hud .help .tip {
        margin-top: 8px;
        opacity: 0.7;
        font-style: italic;
        font-size: 11px;
        line-height: 1.4;
      }
      #hud .help .ui-bar {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px 12px;
        opacity: 0.72;
        font-size: 11px;
      }
      /* center event toast — a restrained glass banner that rises + fades on
         each message (hud.ts toggles .show); readable over bright or dark scenes */
      #hud .center {
        position: absolute;
        left: 50%;
        top: 50%;
        max-width: min(680px, 82vw);
        padding: 9px 18px;
        border-radius: var(--r-lg);
        background: rgba(9, 22, 34, 0.62);
        border: 1px solid var(--hairline-2);
        box-shadow: var(--shadow-md), var(--edge-hi);
        backdrop-filter: blur(var(--blur));
        font-size: 16px;
        font-weight: 600;
        line-height: 1.35;
        text-align: center;
        opacity: 0;
        transform: translate(-50%, -50%) translateY(9px);
        transition:
          opacity 0.2s var(--ease),
          transform 0.2s var(--ease);
      }
      #hud .center.show {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
      #hud .player-locator {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #hud .player-locator.empty {
        opacity: 0;
      }
      #hud .player-locator-marker {
        --hue: 180;
        --angle: 0rad;
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 96px;
        max-width: min(188px, 42vw);
        padding: 5px 8px 5px 5px;
        border-radius: 9px;
        transform: translate(-50%, -112%);
        background: rgba(7, 18, 28, 0.74);
        border: 1px solid hsla(var(--hue), 78%, 66%, 0.72);
        box-shadow:
          0 8px 20px rgba(0, 6, 12, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(5px);
        color: var(--text);
      }
      #hud .player-locator-marker.edge {
        transform: translate(-50%, -50%);
        background: rgba(9, 22, 34, 0.86);
      }
      #hud .player-locator-marker .pl-key {
        flex: 0 0 auto;
        min-width: 22px;
        height: 22px;
        padding: 0 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        background: hsl(var(--hue), 78%, 58%);
        color: #06131a;
        font:
          800 12px var(--font);
        text-shadow: none;
      }
      #hud .player-locator-marker .pl-body {
        min-width: 0;
        display: grid;
        gap: 1px;
      }
      #hud .player-locator-marker .pl-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font:
          800 11.5px var(--font);
      }
      #hud .player-locator-marker .pl-distance {
        color: var(--text-dim);
        opacity: 0.86;
        font: 700 10px var(--font);
        font-variant-numeric: tabular-nums;
      }
      #hud .player-locator-marker .pl-arrow {
        display: none;
        flex: 0 0 9px;
        width: 9px;
        height: 9px;
        border-top: 2px solid var(--text);
        border-right: 2px solid var(--text);
        transform: rotate(var(--angle));
        opacity: 0.86;
      }
      #hud .player-locator-marker.edge .pl-arrow {
        display: inline-block;
      }
      #hud .toolbar {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: calc(100vw - 32px);
        max-width: 860px;
        pointer-events: auto;
      }
      #hud .toolbar .vehicles,
      #hud .toolbar .tools,
      #hud .toolbar .swatches {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
        width: max-content;
        max-width: 100%;
        padding: 6px 8px;
        border-radius: var(--r-md);
        background: var(--surface);
        border: 1px solid var(--hairline);
        box-shadow: var(--shadow-sm), var(--edge-hi);
        backdrop-filter: blur(var(--blur));
      }
      #hud .toolbar .vehicles {
        flex-wrap: nowrap;
        gap: 5px;
        padding: 5px 7px;
      }
      #hud .toolbar .tool {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 30px;
        padding: 4px 10px;
        border-radius: var(--r-sm);
        cursor: pointer;
        background: var(--surface-raised);
        border: 1px solid var(--hairline-2);
        color: var(--text);
        font: 600 11.5px var(--font);
        letter-spacing: 0.02em;
        transition:
          border-color var(--dur) var(--ease),
          color var(--dur) var(--ease),
          background var(--dur) var(--ease),
          transform 0.12s var(--ease);
      }
      #hud .toolbar .vehicle {
        gap: 5px;
        min-height: 27px;
        padding: 3px 7px;
        font-size: 11px;
      }
      #hud .toolbar .vehicle .ic {
        width: 14px;
        font-size: 13px;
      }
      #hud .toolbar .tool .ic {
        width: 16px;
        text-align: center;
        font-size: 14px;
        line-height: 1;
      }
      #hud .toolbar .tool .num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 1px;
        min-width: 15px;
        height: 16px;
        padding: 0 4px;
        border-radius: var(--r-xs);
        background: var(--surface-sunken);
        border: 1px solid var(--hairline-2);
        color: var(--text-dim);
        font: 700 9px var(--font);
        font-variant-numeric: tabular-nums;
        line-height: 1;
        text-shadow: none;
      }
      #hud .toolbar .tool .num .mod {
        font-size: 8px;
        opacity: 0.82;
        line-height: 1;
      }
      #hud .toolbar .tool:hover {
        border-color: var(--hairline-strong);
        background: rgba(26, 52, 70, 0.72);
        transform: translateY(-1px);
      }
      #hud .toolbar .tool:active {
        transform: translateY(0);
      }
      #hud .toolbar .tool.on {
        border-color: var(--accent);
        color: var(--accent-strong);
        background: rgba(22, 64, 70, 0.6);
      }
      #hud .toolbar .tool.on .num {
        border-color: var(--accent-line);
        color: var(--accent-strong);
      }
      /* keyboard-cursor ring: which chip the arrow keys / number row will act on */
      #hud .toolbar .tool.kbd {
        box-shadow: 0 0 0 2px var(--accent-glow);
      }
      #hud .toolbar .hint {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-left: 2px;
        opacity: 0.85;
      }
      #hud .toolbar .hint .k {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 15px;
        height: 15px;
        padding: 0 4px;
        border-radius: var(--r-xs);
        background: var(--surface-raised);
        border: 1px solid var(--hairline-strong);
        color: var(--text-dim);
        font: 600 9px var(--font);
        box-shadow: 0 1px 0 rgba(190, 225, 240, 0.12);
        line-height: 1;
      }
      #hud .toolbar .swatch {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        cursor: pointer;
        padding: 0;
        border: 2px solid var(--hairline-2);
        transition:
          transform 0.12s var(--ease),
          border-color var(--dur) var(--ease);
      }
      #hud .toolbar .swatch:hover {
        transform: scale(1.18);
      }
      #hud .toolbar .swatch.on {
        border-color: #ffffff;
        transform: scale(1.18);
      }
      #hud .toolbar .swatch.kbd {
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.75);
      }
      #hud .toolbar .swatch.rainbow {
        background: conic-gradient(
          #ff2e88,
          #ff7a1a,
          #ffd41f,
          #3dffb0,
          #29d5ff,
          #8f5bff,
          #ff2e88
        );
      }
      @media (max-width: 820px) {
        #hud .toolbar .vehicles .hint {
          display: none;
        }
        #hud .toolbar .vehicle {
          min-width: 32px;
          justify-content: center;
          padding-left: 6px;
          padding-right: 6px;
        }
        #hud .toolbar .vehicle span:not(.ic):not(.num) {
          display: none;
        }
      }
      @media (max-width: 520px) {
        #hud .toolbar .tool {
          padding-left: 8px;
          padding-right: 8px;
        }
      }
      #hud .satchel {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
      }
      #hud .satchel .srow {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px 10px;
        border-radius: var(--r-sm);
        background: var(--surface);
        border: 1px solid var(--hairline);
        box-shadow: var(--shadow-sm), var(--edge-hi);
        backdrop-filter: blur(var(--blur));
        color: #ffe9ae;
        font: 700 13px var(--font);
        font-variant-numeric: tabular-nums;
      }
      #hud .satchel .sic {
        font-size: 15px;
        line-height: 1;
      }
      #hud .satchel .srow.pop {
        animation: satchelpop 0.32s ease;
      }
      @keyframes satchelpop {
        0% {
          transform: scale(1);
        }
        35% {
          transform: scale(1.22);
          border-color: rgba(255, 215, 106, 0.8);
        }
        100% {
          transform: scale(1);
        }
      }
      /* golf: round scorecard chip (top center) + swing rail/force meter
         (bottom center). Same glass recipe as the satchel; keyboard-only, so
         pointer-events stay off like the rest of #hud. */
      #hud .golf-card {
        position: absolute;
        left: 50%;
        top: 14px;
        transform: translateX(-50%) translateY(-8px);
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 7px 14px;
        border-radius: var(--r-md);
        background: var(--surface-strong);
        border: 1px solid var(--hairline-2);
        box-shadow: var(--shadow-sm), var(--edge-hi);
        backdrop-filter: blur(var(--blur));
        opacity: 0;
        transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
        pointer-events: none;
        white-space: nowrap;
      }
      #hud .golf-card.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #hud .golf-card .gc-hole {
        font: 700 14px var(--font);
        color: var(--accent-strong);
        letter-spacing: 0.02em;
      }
      #hud .golf-card .gc-score {
        font: 600 13px var(--font);
        color: rgba(233, 244, 250, 0.92);
        font-variant-numeric: tabular-nums;
      }
      #hud .golf-swing {
        position: absolute;
        left: 50%;
        bottom: 86px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transition: opacity 0.2s var(--ease);
        pointer-events: none;
      }
      #hud .golf-swing.show {
        opacity: 1;
      }
      #hud .golf-clubs {
        display: flex;
        gap: 6px;
      }
      #hud .golf-clubs .gclub {
        display: inline-flex;
        align-items: center;

      }
      #hud .chat-log {
        max-height: 132px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        scrollbar-width: thin;
        scrollbar-color: rgba(111, 215, 196, 0.35) transparent;
      }
      #hud .chat-msg {
        font:
          500 12px/1.35 var(--font);
        color: var(--text);
        word-break: break-word;
      }
      #hud .chat-who {
        color: var(--accent-strong);
        font-weight: 700;
        margin-right: 6px;
      }
      #hud .chat-who::after {
        content: ":";
      }
      #hud .chat-msg.self .chat-who {
        color: var(--accent);
      }
      #hud .chat-body {
        color: var(--text-soft);
      }
      #hud .chat-input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 7px;
        border: 1px solid rgba(190, 225, 240, 0.22);
        background: rgba(6, 16, 25, 0.65);
        color: #eaf6fa;
        outline: none;
        font:
          500 12.5px var(--font);
      }
      #hud .chat-input::placeholder {
        color: rgba(188, 217, 230, 0.45);
      }
      #hud .chat-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(111, 215, 196, 0.25);
      }
      #hud .audio {
        position: absolute;
        bottom: 48px;
        left: 20px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 10px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        backdrop-filter: blur(6px);
        pointer-events: auto;
      }
      #hud .audio-vol {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #hud .audio-sliders {
        display: flex;
        flex-direction: column;
        gap: 5px;
        flex: 1;
        min-width: 0;
      }
      #hud .audio-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
      }
      #hud .audio-lbl {
        flex: 0 0 34px;
        font:
          600 10px var(--font);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(188, 217, 230, 0.72);
      }
      #hud .audio .mute {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
        padding: 0;
      }
      #hud .audio .mic-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 7px;
        cursor: pointer;
        background: rgba(18, 40, 56, 0.6);
        border: 1px solid rgba(190, 225, 240, 0.25);
        color: var(--text-dim);
        font:
          600 11.5px var(--font);
        letter-spacing: 0.02em;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      #hud .audio .mic-btn .ic {
        font-size: 18px;
        line-height: 1;
      }
      #hud .audio .mic-btn:hover {
        border-color: rgba(190, 225, 240, 0.55);
      }
      #hud .audio .mic-btn.on {
        border-color: var(--accent);
        color: var(--accent-strong);
      }
      #hud .audio input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        min-width: 72px;
        height: 3px;
        border-radius: 2px;
        background: rgba(190, 225, 240, 0.3);
        outline: none;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      #hud .audio input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--accent);
      }
      #hud .audio input[type="range"]::-moz-range-thumb {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
      }
      #hud .audio input[type="range"].off {
        opacity: 0.35;
      }
      #hud .minimap {
        position: absolute;
        top: 16px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 236px;
        pointer-events: auto;
        user-select: none;
      }
      #hud .minimap .mm-card {
        position: relative;
        border-radius: var(--r-xl);
        overflow: hidden;
        border: 1px solid var(--hairline-strong);
        background: var(--surface-strong);
        box-shadow:
          var(--shadow-md),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        cursor: grab;
        touch-action: none;
      }
      #hud .minimap .mm-card.dragging {
        cursor: grabbing;
      }
      #hud .minimap canvas {
        display: block;
      }
      #hud .minimap .mm-count {
        position: absolute;
        left: 9px;
        bottom: 9px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        justify-content: center;
        padding: 6px 10px;
        pointer-events: none;
        border-radius: var(--r-pill);
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: uppercase;
        color: var(--text);
        background: rgba(12, 19, 27, 0.82);
        border: 1px solid var(--hairline-2);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.26);
      }
      #hud .minimap .mm-count-dot {
        width: 9px;
        height: 9px;
        flex: 0 0 9px;
        border-radius: 50%;
        background: #57c46a;
        box-shadow: 0 0 10px rgba(87, 196, 106, 0.72);
      }
      /* bottom-right expand affordance — big enough to hit, small enough to
         leave the rest of the map free for panning */
      #hud .minimap .mm-expand {
        position: absolute;
        right: 9px;
        bottom: 9px;
        width: 34px;
        height: 34px;
        padding: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r-md);
        color: var(--text);
        background: rgba(12, 19, 27, 0.82);
        border: 1px solid var(--hairline-strong);
        box-shadow: var(--edge-hi), 0 8px 18px rgba(0, 0, 0, 0.26);
        font-size: 18px;
        line-height: 1;
        font-weight: 700;
        transition:
          border-color var(--dur) var(--ease),
          background var(--dur) var(--ease),
          transform 0.12s var(--ease);
      }
      #hud .minimap .mm-expand:hover {
        border-color: var(--accent);
        color: var(--accent-strong);
        transform: translateY(-1px);
        background: rgba(16, 30, 42, 0.9);
      }
      #hud .minimap .mm-expand:active {
        transform: translateY(0);
      }
      #hud .minimap .mm-teleport {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px 6px 11px;
        border-radius: 12px;
        background: var(--surface-strong);
        border: 1px solid var(--hairline-2);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 5px 14px rgba(0, 0, 0, 0.22);
      }
      #hud .minimap .mm-teleport-name {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font:
          600 12px var(--font);
        color: var(--text);
      }
      #hud .minimap .mm-teleport-btn {
        flex: 0 0 auto;
        cursor: pointer;
        padding: 5px 12px;
        border-radius: 8px;
        color: #062018;
        background: var(--accent);
        border: 1px solid var(--accent);
        font:
          700 11.5px var(--font);
        letter-spacing: 0.02em;
        transition:
          filter 0.15s,
          transform 0.12s;
      }
      #hud .minimap .mm-teleport-btn:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }
      #hud .minimap .mm-layers {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
      #hud .minimap .mm-layer {
        min-width: 0;
        height: 34px;
        padding: 0 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 12px;
        cursor: pointer;
        border: 1px solid var(--hairline-2);
        background: linear-gradient(
          180deg,
          rgba(56, 59, 72, 0.86),
          rgba(35, 38, 48, 0.9)
        );
        color: #f0f4f7;
        font:
          700 12.5px var(--font);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 5px 14px rgba(0, 0, 0, 0.22);
        transition:
          border-color 0.15s,
          opacity 0.15s,
          transform 0.12s,
          filter 0.15s;
      }
      #hud .minimap .mm-layer:hover {
        border-color: rgba(225, 235, 243, 0.42);
        transform: translateY(-1px);
      }
      #hud .minimap .mm-layer:not(.on) {
        opacity: 0.42;
        filter: saturate(0.55);
      }
      #hud .minimap .mm-layer-dot {
        width: 10px;
        height: 10px;
        flex: 0 0 10px;
        border-radius: 50%;
        background: var(--layer-color);
        box-shadow: 0 0 10px var(--layer-color);
      }
      #hud .minimap .mm-layer-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bigmap {
        position: fixed;
        inset: 0;
        z-index: var(--z-map);
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 10, 16, 0.55);
        backdrop-filter: blur(3px);
        font-family: var(--font);
      }
      .bigmap-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .bigmap canvas {
        border-radius: 14px;
        cursor: grab;
        touch-action: none;
        border: 1px solid rgba(190, 225, 240, 0.2);
        box-shadow: 0 14px 70px rgba(0, 0, 0, 0.55);
      }
      .bigmap canvas.dragging {
        cursor: grabbing;
      }
      .bigmap-action {
        min-width: min(420px, calc(100vw - 48px));
        max-width: calc(100vw - 48px);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 9px 8px 12px;
        border-radius: 12px;
        background: rgba(10, 24, 36, 0.82);
        border: 1px solid var(--hairline-strong);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 10px 28px rgba(0, 0, 0, 0.28);
      }
      .bigmap-target {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font:
          700 13px var(--font);
      }
      .bigmap-teleport-btn {
        flex: 0 0 auto;
        cursor: pointer;
        padding: 7px 14px;
        border-radius: 8px;
        color: #062018;
        background: var(--accent);
        border: 1px solid var(--accent);
        font:
          800 12px var(--font);
        letter-spacing: 0.02em;
        transition:
          filter 0.15s,
          transform 0.12s;
      }
      .bigmap-teleport-btn:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }
      .bigmap-hint {
        color: var(--text-dim);
        font-size: 12px;
        opacity: 0.85;
        text-shadow: 0 1px 3px rgba(0, 10, 20, 0.8);
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        /* soft central glow over the tint focuses the eye on the name form */
        background:
          radial-gradient(
            120% 85% at 50% 42%,
            rgba(24, 52, 74, 0.5),
            rgba(8, 20, 34, 0) 60%
          ),
          rgba(8, 20, 34, 0.62);
        backdrop-filter: blur(2px) saturate(0.7);
        color: var(--text-soft);
        font-family: var(--font);
        transition: opacity 0.6s ease;
        z-index: var(--z-loading);
      }
      /* keep the HUD (center messages, minimap) out of sight behind the start
         gate — otherwise "Online as …" bleeds through the translucent tint */
      #hud {
        transition: opacity 0.4s ease;
      }
      body:not(.started) #hud {
        opacity: 0;
        pointer-events: none;
      }
      /* opaque backdrop while tiles stream in; once the city is ready it fades,
         leaving the translucent tint above with the name form over the live city */
      #loading::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(180deg, #14283a 0%, #0b1520 100%);
        transition: opacity 0.9s ease;
      }
      #loading.ready::before {
        opacity: 0;
      }
      #loading h1 {
        margin: 0 0 2px;
        font-size: clamp(24px, 4.4vw, 34px);
        letter-spacing: 0.34em;
        /* optical: uppercase tracking pushes the last glyph right, so pull it
           back with an equal indent to keep the title centered */
        text-indent: 0.34em;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text);
        text-shadow: 0 2px 18px rgba(0, 8, 14, 0.75);
      }
      /* slim accent rule under the title — a premium anchor, hidden once ready
         so it doesn't linger over the form */
      #loading h1::after {
        content: "";
        display: block;
        width: 46px;
        height: 2px;
        margin: 12px auto 0;
        border-radius: var(--r-pill);
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0.9;
        transition: opacity 0.5s ease;
      }
      #loading.ready h1::after {
        opacity: 0;
      }
      #loading .bar {
        width: 260px;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: var(--r-pill);
        overflow: hidden;
      }
      #loading .bar > div {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-strong));
        box-shadow: 0 0 12px var(--accent-glow);
        transition: width 0.3s var(--ease);
      }
      #loading [data-loading-label] {
        font-variant-numeric: tabular-nums;
      }
      #loading.done {
        opacity: 0;
        pointer-events: none;
      }
      /* name gate: shows up front so you can type a name while the city streams
         in; the Start button stays disabled until load completes (.ready) */
      #loading .start-form {
        display: flex;
        margin-top: 6px;
        gap: 10px;
        align-items: center;
        animation: startin 0.35s var(--ease);
      }
      #loading.ready .bar,
      #loading.ready [data-loading-label] {
        display: none;
      }
      @keyframes startin {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
      }
      #loading .start-form input {
        width: 210px;
        height: 40px;
        box-sizing: border-box;
        padding: 0 14px;
        border-radius: var(--r-md);
        outline: none;
        background: var(--surface-sunken);
        color: var(--text);
        border: 1px solid var(--hairline-strong);
        font: 600 14px var(--font);
        letter-spacing: 0.02em;
        text-align: center;
        transition:
          border-color var(--dur) var(--ease),
          box-shadow var(--dur) var(--ease),
          background var(--dur) var(--ease);
      }
      #loading .start-form input:focus {
        border-color: var(--accent);
        background: var(--surface-strong);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      #loading .start-form input::placeholder {
        color: rgba(234, 244, 248, 0.38);
      }
      #loading .start-form button {
        height: 40px;
        padding: 0 24px;
        border-radius: var(--r-md);
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent-strong), var(--accent));
        color: var(--on-accent);
        border: none;
        font: 700 13px var(--font);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        box-shadow:
          var(--edge-hi),
          0 6px 18px rgba(87, 199, 176, 0.32);
        transition:
          transform 0.12s var(--ease),
          filter var(--dur) var(--ease),
          box-shadow var(--dur) var(--ease);
      }
      #loading .start-form button:hover:not(:disabled) {
        filter: brightness(1.06);
        transform: translateY(-1px);
        box-shadow:
          var(--edge-hi),
          0 8px 22px rgba(87, 199, 176, 0.42);
      }
      #loading .start-form button:active:not(:disabled) {
        transform: translateY(0);
      }
      #loading .start-form button:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 3px;
      }
      #loading .start-form button:disabled {
        background: rgba(111, 215, 196, 0.22);
        color: rgba(11, 21, 32, 0.55);
        box-shadow: none;
        cursor: default;
      }
      #loading .start-hint {
        font-size: 11px;
        color: var(--text-dim);
        opacity: 0.75;
        text-shadow: 0 1px 4px rgba(0, 8, 14, 0.8);
      }
      #loading .controls-hint {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--text-dim);
        opacity: 0.9;
        text-shadow: 0 1px 4px rgba(0, 8, 14, 0.8);
      }
      #loading .controls-hint .row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      #loading .controls-hint .k {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 10px;
        height: 18px;
        padding: 0 6px;
        border-radius: var(--r-xs);
        background: var(--surface-raised);
        border: 1px solid var(--hairline-strong);
        box-shadow: 0 1px 0 rgba(190, 225, 240, 0.16);
        color: var(--text);
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.02em;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="br-stack">
        <div class="help" data-hud="help"></div>
      </div>
      <div class="center" data-hud="center"></div>
      <button
        type="button"
        class="ui-restore"
        data-ui-restore
        title="Show UI (Tab)"
        aria-label="Show UI"
      >
        <span class="ic" aria-hidden="true">▤</span>
      </button>
    </div>
    <div id="loading">
      <h1>San Francisco</h1>
      <div class="bar"><div data-loading-bar></div></div>
      <div data-loading-label style="font-size: 12px; opacity: 0.7"></div>
      <form class="start-form" data-start-form>
        <input
          data-name-input
          type="text"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
          aria-label="Your name"
          autofocus
        />
        <button type="submit" disabled>Start</button>
      </form>
      <div class="start-hint">
        pick a name, or roll with the one we gave you
      </div>
      <div class="controls-hint" aria-label="Essential controls">
        <div class="row"><span class="k">Tab</span><span>toggle UI</span></div>
        <div class="row">
          <span class="k">Esc</span><span>release mouse</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
