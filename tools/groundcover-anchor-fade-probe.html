<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ground-cover anchor fade probe</title>
    <style>
      html, body { margin: 0; background: #050505; }
      canvas { display: block; width: 320px; height: 320px; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <script type="module">
      // Rendered regression for large-coordinate anchor fades. Streamed grass
      // reconstructs its compact transform but extinguishes deterministic whole
      // blades instead of scaling the field into the floor. Flowers retain their
      // existing anchored scale handoff.
      import * as THREE from "three/webgpu";
      import { color } from "three/tsl";
      import {
        createGrassMaterial,
        createGrassMesh,
        createMicroBladeClusterGeometry,
        writeGrassMesh
      } from "/src/world/groundcover/bladeGrass.ts";
      import {
        WILD_GRASS_LAYER_SPECS,
        WILD_GRASS_RING_RADIUS,
        WILD_GRASS_SPACING,
        WILD_GRASS_TILE_SIZE,
        wildGrassBladeDensityAt,
        wildGrassLayerKeep,
        wildGrassLayersAt
      } from "/src/world/wildlands/grassField.ts";
      import {
        createFlowerRing,
        FLOWER_EDGE_FADE_BAND_METRES,
        FLOWER_EDGE_STAGGER_METRES,
        FLOWER_ROTATION_SHADE_AMPLITUDE
      } from "/src/world/wildlands/flowerRing.ts";

      const W = 320;
      const H = 320;
      const ANCHOR = new THREE.Vector3(8192, 0, 8192);
      const GRASS_REACH = 20;
      const GRASS_FADE_BAND_METRES = 8;
      const FLOWER_HERO_FADE_START = 13;
      const FLOWER_HERO_FADE_END = 19;
      const FLOWER_REACH = 110;
      const FADE_BAND = 0.16;

      function finish(result) {
        window.__probeResult = result;
        console.log("PROBE_RESULT " + JSON.stringify(result, null, 1));
      }

      function focusForFade(reach, fade, band = Math.max(reach * FADE_BAND, 1)) {
        // Production coverage: clamp((reach - distance) / absoluteFadeBand).
        // Moving focus on +X keeps the rendered instance fixed at the large anchor.
        const distance = fade >= 1 ? 0 : reach - fade * band;
        return new THREE.Vector2(ANCHOR.x + distance, ANCHOR.z);
      }

      function focusForFlowerHeroFade(fade) {
        // This fixture injects its instance into the production hero bucket.
        // Exercise that bucket's actual inverse-smoothstep handoff instead of
        // the much farther outer-ring fade, where a hero is intentionally gone.
        const distance = fade >= 1
          ? 0
          : fade <= 0
            ? FLOWER_HERO_FADE_END + 1
            : (FLOWER_HERO_FADE_START + FLOWER_HERO_FADE_END) * 0.5;
        return new THREE.Vector2(ANCHOR.x + distance, ANCHOR.z);
      }

      function focusForFlowerEdgeFade(fade) {
        // aFlowerAnchor.w = 1 below maps to phase 0.5. Its deterministic outer
        // window therefore ends halfway through the eight-metre stagger band.
        const edgeEnd = FLOWER_REACH - FLOWER_EDGE_STAGGER_METRES * 0.5;
        const edgeStart = edgeEnd - FLOWER_EDGE_FADE_BAND_METRES;
        const distance = fade >= 1
          ? edgeStart - 1
          : fade <= 0
            ? edgeEnd + 1
            : (edgeStart + edgeEnd) * 0.5;
        return new THREE.Vector2(ANCHOR.x + distance, ANCHOR.z);
      }

      function anchorPixel(camera) {
        const p = ANCHOR.clone().project(camera);
        return {
          x: (p.x * 0.5 + 0.5) * W,
          // readRenderTargetPixelsAsync returns WebGPU rows top-to-bottom.
          y: (1 - (p.y * 0.5 + 0.5)) * H
        };
      }

      function analyzePixels(buf, expectedAnchor) {
        let pixels = 0;
        let anchorPixels = 0;
        let sx = 0;
        let sy = 0;
        let minX = W;
        let minY = H;
        let maxX = -1;
        let maxY = -1;
        const anchorRadius2 = 72 * 72;
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const i = (y * W + x) * 4;
            const r = buf[i];
            const g = buf[i + 1];
            const b = buf[i + 2];
            // The target materials are forced emissive for this position-only
            // fixture. The render target is cleared to exact black.
            if (Math.max(r, g, b) < 20 || r + g + b < 45) continue;
            pixels++;
            sx += x;
            sy += y;
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
            const dx = x - expectedAnchor.x;
            const dy = y - expectedAnchor.y;
            if (dx * dx + dy * dy <= anchorRadius2) anchorPixels++;
          }
        }
        return {
          pixels,
          anchorPixels,
          centroid: pixels ? [+(sx / pixels).toFixed(2), +(sy / pixels).toFixed(2)] : null,
          bbox: pixels ? [minX, minY, maxX, maxY] : null
        };
      }

      function verifyTriplet(system, samples) {
        const full = samples.find((sample) => sample.fade === 1);
        const half = samples.find((sample) => sample.fade === 0.5);
        const zero = samples.find((sample) => sample.fade === 0);
        const checks = [
          {
            name: `${system}: full fade rasterizes`,
            pass: full.pixels >= 64,
            detail: `${full.pixels} lit pixels`
          },
          {
            name: `${system}: half fade remains at its large-coordinate anchor`,
            pass: half.pixels >= 12 && half.anchorPixels >= Math.max(6, Math.floor(half.pixels * 0.35)),
            detail: `${half.pixels} lit / ${half.anchorPixels} near anchor`
          },
          {
            name: `${system}: half fade is smaller than full fade`,
            pass: half.pixels < full.pixels * 0.75,
            detail: `pixel ratio ${(half.pixels / Math.max(full.pixels, 1)).toFixed(3)}`
          },
          {
            name: `${system}: zero fade is degenerate`,
            pass: zero.pixels <= 1,
            detail: `${zero.pixels} lit pixels`
          }
        ];
        return { system, ok: checks.every((check) => check.pass), checks, samples };
      }

      async function run() {
        if (!navigator.gpu) {
          finish({
            ok: false,
            unavailable: true,
            error: "WebGPU is unavailable (navigator.gpu is missing); this GPU regression cannot run."
          });
          return;
        }

        const rendererOptions = { getFallback: null };
        const renderer = new THREE.Renderer(
          new THREE.WebGPUBackend(rendererOptions),
          rendererOptions
        );
        renderer.library = new THREE.StandardNodeLibrary();
        renderer.setPixelRatio(1);
        renderer.setSize(W, H, false);
        renderer.setClearColor(0x000000, 1);
        renderer.toneMapping = THREE.NoToneMapping;
        await renderer.init();

        if (!renderer.backend?.isWebGPUBackend) {
          finish({
            ok: false,
            unavailable: true,
            error: `WebGPU backend is required; renderer selected ${renderer.backend?.constructor?.name ?? "unknown"}.`
          });
          renderer.dispose();
          return;
        }
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.add(new THREE.AmbientLight(0xffffff, 2));
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(ANCHOR.x + 2, 5, ANCHOR.z + 3);
        scene.add(sun);

        const camera = new THREE.OrthographicCamera(-1.3, 1.3, 1.3, -1.3, 0.1, 20);
        camera.position.set(ANCHOR.x, 0.62, ANCHOR.z + 5);
        camera.lookAt(ANCHOR.x, 0.62, ANCHOR.z);
        // Production's beauty camera enables layer 31 while its half-resolution
        // ink prepass stays on layer 0. Flowers intentionally live beauty-only.
        camera.layers.enable(31);
        camera.updateMatrixWorld(true);
        const expectedAnchor = anchorPixel(camera);

        // Grass: public production factory + the production attribute writer.
        const grassState = createGrassMaterial({
          fadeMode: "rank",
          fadeBand: GRASS_FADE_BAND_METRES
        });
        // Make fragment output deterministic while retaining the production
        // positionNode object verbatim (the only graph this probe exercises).
        grassState.material.colorNode = color(0x82ff45);
        grassState.material.emissiveNode = color(0x82ff45);
        const grassGeometry = createMicroBladeClusterGeometry({
          blades: 24,
          width: 0.11,
          radius: 0.18,
          lean: 0.22
        });
        const grass = createGrassMesh("anchor_probe_grass", 1, grassGeometry, grassState.material, false);
        writeGrassMesh(grass, [{
          x: ANCHOR.x,
          y: ANCHOR.y,
          z: ANCHOR.z,
          yaw: 0.31,
          height: 1.2,
          spread: 1.45,
          color: new THREE.Color(1, 1, 1),
          windAmp: 0
        }], GRASS_REACH);
        const grassInstanceAttributes = ["aGrassTransform", "aGrassShape", "aGrassColor"]
          .map((name) => grass.geometry.getAttribute(name));
        const grassBytesPerInstance = grassInstanceAttributes.reduce(
          (sum, attribute) => sum + attribute.itemSize * attribute.array.BYTES_PER_ELEMENT,
          0
        );
        const authoredNormals = grassGeometry.getAttribute("normal");
        let directionalNormals = 0;
        for (let i = 0; i < authoredNormals.count; i++) {
          if (Math.hypot(authoredNormals.getX(i), authoredNormals.getZ(i)) > 0.5) directionalNormals++;
        }
        const grassContracts = [
          {
            name: "grass: compact instanced geometry path",
            pass: grass.geometry.isInstancedBufferGeometry === true && grass.isInstancedMesh !== true,
            detail: grass.geometry.type
          },
          {
            name: "grass: instance payload stays at 36 bytes",
            pass: grassBytesPerInstance === 36,
            detail: `${grassBytesPerInstance} bytes`
          },
          {
            name: "grass: structural blade normals are directional",
            pass: directionalNormals === authoredNormals.count,
            detail: `${directionalNormals}/${authoredNormals.count} directional normals`
          },
          {
            name: "grass: designed density guarantees a base cluster",
            pass: [0, 0.25, 0.5, 0.75, 1].every((patch) => wildGrassLayerKeep(1, 1, patch, 0) === 1),
            detail: "all patch samples retain layer 0"
          },
          {
            name: "grass: stable tiles use the dense spacing contract",
            pass: WILD_GRASS_SPACING <= 0.7 && WILD_GRASS_TILE_SIZE >= 16,
            detail: `${WILD_GRASS_SPACING} m spacing / ${WILD_GRASS_TILE_SIZE} m tiles`
          },
          {
            name: "grass: pointed microblades submit one triangle each",
            pass: (grassGeometry.index?.count ?? 0) / 3 === 24,
            detail: `${(grassGeometry.index?.count ?? 0) / 3} triangles / 24 blades`
          },
          {
            name: "grass: additive layers retain a far base under close detail",
            pass:
              wildGrassLayersAt(0).join(",") === "far,mid,near,hero" &&
              wildGrassLayersAt(40).join(",") === "far,mid" &&
              wildGrassLayersAt(90).join(",") === "far",
            detail: `${wildGrassLayersAt(0).join("+")} → ${wildGrassLayersAt(40).join("+")} → ${wildGrassLayersAt(90).join("+")}`
          },
          {
            name: "grass: far reach and close density meet the field contract",
            pass:
              WILD_GRASS_RING_RADIUS === 110 &&
              WILD_GRASS_LAYER_SPECS.far.visibleRadius === 110 &&
              wildGrassBladeDensityAt(0) >= 23,
            detail: `${WILD_GRASS_RING_RADIUS} m / ${wildGrassBladeDensityAt(0).toFixed(2)} blades·m⁻²`
          }
        ];
        scene.add(grass);

        // Flowers: createFlowerRing owns the private production material state.
        // Updating far outside every wild region only writes its focus uniform and
        // deliberately avoids terrain/map sampling; then the fixture writes one
        // deterministic hero and far accents into production instance attributes.
        const flowers = createFlowerRing({
          groundHeight: () => 0,
          surfaceType: () => 0,
          isWater: () => false
        });
        flowers.update({ x: ANCHOR.x, z: ANCHOR.z });
        const flowerMeshes = flowers.group.children.filter((child) => child.isInstancedMesh);
        const heroFlower = flowerMeshes.find((mesh) => mesh.name.startsWith("wildlands_flowers_hero_"));
        const farFlower = flowerMeshes.find((mesh) => mesh.name.startsWith("wildlands_flowers_far_"));
        if (!heroFlower || !farFlower) throw new Error("production hero/far flower buckets are missing");
        for (const mesh of flowerMeshes) {
          mesh.count = 0;
          mesh.visible = false;
        }

        const flowerDummy = new THREE.Object3D();
        flowerDummy.position.copy(ANCHOR);
        flowerDummy.rotation.y = 0.47;
        flowerDummy.scale.set(1.75, 1.75, 1.75);
        flowerDummy.updateMatrix();

        function injectFlower(mesh, rotationShade) {
          mesh.material.colorNode = color(0xff4ec4);
          mesh.material.emissiveNode = color(0xff4ec4);
          mesh.receiveShadow = false;
          flowerDummy.matrix.toArray(mesh.instanceMatrix.array, 0);
          mesh.instanceMatrix.needsUpdate = true;
          const bloom = mesh.geometry.getAttribute("aBloom");
          bloom.setXYZ(0, 1, 1, 1);
          bloom.needsUpdate = true;
          const anchor = mesh.geometry.getAttribute("aFlowerAnchor");
          anchor.setXYZW(0, ANCHOR.x, ANCHOR.y, ANCHOR.z, rotationShade);
          anchor.needsUpdate = true;
          // Wind is not part of this regression. Zeroing its static tip weights
          // keeps pixel counts identical while the production position graph runs.
          const sway = mesh.geometry.getAttribute("aSway");
          sway.array.fill(0);
          sway.needsUpdate = true;
          mesh.count = 1;
          // Production uploads recompute exact per-sector bounds. This fixture
          // bypasses that writer, so refresh the manually injected bound.
          mesh.computeBoundingSphere();
          mesh.boundingSphere.radius += 0.65;
        }
        injectFlower(heroFlower, 1);
        injectFlower(farFlower, 1);
        scene.add(flowers.group);

        const target = new THREE.RenderTarget(W, H, {
          type: THREE.UnsignedByteType,
          colorSpace: THREE.SRGBColorSpace,
          depthBuffer: true
        });

        async function renderSample(system, fade) {
          grass.visible = system === "grass";
          flowers.group.visible = system === "flower" || system === "flower-edge";
          heroFlower.visible = system === "flower";
          farFlower.visible = system === "flower-edge";
          if (system === "grass") {
            const focus = focusForFade(GRASS_REACH, fade, GRASS_FADE_BAND_METRES);
            grassState.focus.copy(focus);
          } else if (system === "flower") {
            const focus = focusForFlowerHeroFade(fade);
            // update() always moves the private per-ring focus uniform before its
            // resample throttle / outside-region early return.
            flowers.update({ x: focus.x, z: focus.y });
          } else if (system === "flower-edge") {
            const anchor = farFlower.geometry.getAttribute("aFlowerAnchor");
            anchor.setW(0, 1);
            anchor.needsUpdate = true;
            const focus = focusForFlowerEdgeFade(fade);
            flowers.update({ x: focus.x, z: focus.y });
          }
          renderer.setRenderTarget(target);
          await renderer.renderAsync(scene, camera);
          const buf = await renderer.readRenderTargetPixelsAsync(target, 0, 0, W, H);
          return { fade, ...analyzePixels(buf, expectedAnchor) };
        }

        async function captureCurrentFlower(label) {
          renderer.setRenderTarget(target);
          await renderer.renderAsync(scene, camera);
          const buf = await renderer.readRenderTargetPixelsAsync(target, 0, 0, W, H);
          return { fade: label, ...analyzePixels(buf, expectedAnchor) };
        }

        const grassSamples = [];
        const flowerSamples = [];
        const flowerEdgeSamples = [];
        for (const fade of [1, 0.5, 0]) grassSamples.push(await renderSample("grass", fade));
        for (const fade of [1, 0.5, 0]) flowerSamples.push(await renderSample("flower", fade));
        for (const fade of [1, 0.5, 0]) flowerEdgeSamples.push(await renderSample("flower-edge", fade));

        // At one fixed radius, the late phase remains visible while the early
        // phase has already dissolved. This is the rendered proof that the edge
        // no longer resolves into one circular threshold.
        const staggerDistance = FLOWER_REACH - FLOWER_EDGE_STAGGER_METRES + 1;
        const farAnchor = farFlower.geometry.getAttribute("aFlowerAnchor");
        farAnchor.setW(0, 1 + FLOWER_ROTATION_SHADE_AMPLITUDE);
        farAnchor.needsUpdate = true;
        flowers.update({ x: ANCHOR.x + staggerDistance, z: ANCHOR.z });
        const latePhase = await captureCurrentFlower("late");
        farAnchor.setW(0, 1 - FLOWER_ROTATION_SHADE_AMPLITUDE);
        farAnchor.needsUpdate = true;
        const earlyPhase = await captureCurrentFlower("early");
        const edgeStagger = {
          ok: latePhase.pixels >= 8 && earlyPhase.pixels <= 1,
          distance: staggerDistance,
          latePhase,
          earlyPhase
        };

        renderer.setRenderTarget(null);
        const systems = [
          verifyTriplet("grass", grassSamples),
          verifyTriplet("flower", flowerSamples),
          verifyTriplet("flower-edge", flowerEdgeSamples)
        ];
        const result = {
          ok:
            systems.every((system) => system.ok) &&
            grassContracts.every((contract) => contract.pass) &&
            edgeStagger.ok,
          backend: "webgpu",
          anchor: ANCHOR.toArray(),
          expectedAnchorPixel: [
            +expectedAnchor.x.toFixed(2),
            +expectedAnchor.y.toFixed(2)
          ],
          systems,
          edgeStagger,
          grassContracts
        };
        finish(result);

        target.dispose();
        grassGeometry.dispose();
        renderer.dispose();
      }

      run().catch((error) => {
        finish({ ok: false, error: String(error?.stack ?? error) });
      });
    </script>
  </body>
</html>
