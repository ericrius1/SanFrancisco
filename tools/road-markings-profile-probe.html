<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body, canvas { width: 100%; height: 100%; margin: 0; display: block; overflow: hidden; }
    #status { position: fixed; left: 12px; top: 12px; color: white; font: 14px monospace; background: #000b; padding: 8px; z-index: 2; }
  </style>
</head>
<body>
  <div id="status">loading</div>
  <script type="module">
    import * as THREE from "three/webgpu";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";
    import { WorldMap } from "/src/world/heightmap.ts";
    import { createRoadMarkings } from "/src/world/roadMarkings.ts";

    const status = document.querySelector("#status");
    window.addEventListener("error", (e) => { status.textContent = `error: ${e.message}`; document.title = "road-markings-error"; });
    window.addEventListener("unhandledrejection", (e) => { status.textContent = `rejection: ${e.reason}`; document.title = "road-markings-error"; });
    if (!navigator.gpu) throw new Error("WebGPU is required for this project probe");
        const rendererOptions = { getFallback: null };
    const renderer = new THREE.Renderer(
      new THREE.WebGPUBackend(rendererOptions),
      rendererOptions
    );
    renderer.library = new THREE.StandardNodeLibrary();
    renderer.setPixelRatio(1);
    renderer.setSize(innerWidth, innerHeight);
    await renderer.init();
    if (!renderer.backend.isWebGPUBackend) throw new Error("WebGPU backend initialization failed");
    document.body.append(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x8793a0);
    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.2, 500);
    status.textContent = "loading map";
    const map = await WorldMap.load();
    status.textContent = "loading roads";
    const roadData = await fetch("/data/roads.json").then((r) => r.json());
    const TARGET = { x: 4260, z: 420 };
    let best = null;
    for (const seg of roadData.segs) {
      if (seg.d === 1 || seg.d === -1) continue;
      for (let i = 0; i < seg.p.length - 2; i += 2) {
        const ax = seg.p[i] / 10, az = seg.p[i + 1] / 10;
        const bx = seg.p[i + 2] / 10, bz = seg.p[i + 3] / 10;
        const dx = bx - ax, dz = bz - az, ll = dx * dx + dz * dz;
        if (ll < 1) continue;
        const t = Math.max(0, Math.min(1, ((TARGET.x - ax) * dx + (TARGET.z - az) * dz) / ll));
        const x = ax + dx * t, z = az + dz * t;
        const d2 = (x - TARGET.x) ** 2 + (z - TARGET.z) ** 2;
        if (!best || d2 < best.d2) best = { x, z, ux: dx / Math.sqrt(ll), uz: dz / Math.sqrt(ll), d2 };
      }
    }

    const meta = await fetch("/data/manifest.json").then((r) => r.json());
    const ix = Math.floor((best.x - meta.minX) / meta.tile);
    const iz = Math.floor((best.z - meta.minZ) / meta.tile);
    const gltf = await new GLTFLoader().setMeshoptDecoder(MeshoptDecoder).loadAsync(`/tiles/tile_${ix}_${iz}.glb`);
    status.textContent = `building tile ${ix}_${iz}`;
    const asphalt = new THREE.MeshBasicMaterial({ color: 0x24282d, side: THREE.DoubleSide });
    gltf.scene.traverse((o) => {
      if (!o.isMesh) return;
      o.visible = o.name.startsWith("road_");
      if (o.visible) o.material = asphalt;
    });
    scene.add(gltf.scene);
    status.textContent = "building markings";
    const markings = await createRoadMarkings(scene, map);
    for (const mesh of markings.children) {
      mesh.material = new THREE.MeshBasicMaterial({ color: mesh.name.includes("Yellow") ? 0xffcc33 : 0xffffff, side: THREE.DoubleSide });
    }

    const y = map.groundHeight(best.x, best.z) + 0.3;
    camera.position.set(best.x - best.ux * 35 - best.uz * 7, y + 12, best.z - best.uz * 35 + best.ux * 7);
    camera.lookAt(best.x + best.ux * 75, y, best.z + best.uz * 75);
    renderer.render(scene, camera);
    const tris = markings.children.reduce((n, o) => n + o.geometry.attributes.position.count / 3, 0);
    status.textContent = `ready tile ${ix}_${iz} · ${Math.round(tris).toLocaleString()} marking tris`;
    document.title = "road-markings-ready";
  </script>
</body>
</html>
