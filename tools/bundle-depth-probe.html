<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>firefly depth probe</title>
    <style>
      body { margin: 0; background: #111; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script type="module">
      // Minimal repro harness for the busker-firefly occlusion artifacts:
      // renders THREE.Sprite quads under the game's exact renderer flags
      // (reversedDepthBuffer) + the additiveWorld transparency policy, against
      // opaque occluders at several depths, then reads pixels back and reports
      // which sprites survived the depth test. No game code besides the policy.
      import * as THREE from "three/webgpu";
      import { applyMaterialPolicy, RenderBand, tagTransparency } from "/src/render/transparency.ts";
      import { applyBundleOrderPatch } from "/src/render/bundleOrderPatch.ts";

      const W = 256;
      const H = 256;

      async function run() {
        const renderer = new THREE.WebGPURenderer({ antialias: false, reversedDepthBuffer: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);
        await renderer.init();
        applyBundleOrderPatch(renderer); // bundles must draw BEFORE transparency (r185 draws them last)

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        // Same clip range as main.ts so depth precision behavior matches.
        const camera = new THREE.PerspectiveCamera(60, W / H, 0.3, 24000);
        camera.position.set(0, 0, 0);
        // The game's beauty pass renders layers 0 + 31 (ink-excluded objects
        // like the fireflies live on 31 only).
        camera.layers.enable(31);

        // Occluders (opaque, depth-written) — inside a BundleGroup, exactly like
        // the game's streamed tiles. This is the ONLY difference from
        // firefly-depth-probe.html (which passes).
        const bundle = new THREE.BundleGroup();
        scene.add(bundle);

        const wall = new THREE.Mesh(
          new THREE.PlaneGeometry(200, 200),
          new THREE.MeshBasicMaterial({ color: 0x003300 })
        );
        wall.position.set(0, 0, -50); // "cliff" far behind
        bundle.add(wall);

        const box = new THREE.Mesh(
          new THREE.BoxGeometry(2, 2, 2),
          new THREE.MeshBasicMaterial({ color: 0x000033 })
        );
        box.position.set(-3, 0, -8); // "player" near the camera, left side
        bundle.add(box);

        // second occluder on its own ray so the front-of-player case does not
        // share a pixel with the behind-player case
        const box2 = new THREE.Mesh(
          new THREE.BoxGeometry(2, 2, 2),
          new THREE.MeshBasicMaterial({ color: 0x330000 })
        );
        box2.position.set(3.2, 0, -8);
        bundle.add(box2);

        const glow = (() => {
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = 64;
          const ctx = canvas.getContext("2d");
          const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 31);
          g.addColorStop(0, "rgba(255,255,230,1)");
          g.addColorStop(1, "rgba(160,220,40,0)");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, 64, 64);
          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          return tex;
        })();

        // Exactly how fireflies.ts builds its sprites.
        const addSprite = (name, x, y, z, scale) => {
          const material = new THREE.SpriteMaterial({ map: glow, color: 0xf2ff7a, opacity: 1 });
          applyMaterialPolicy(material, "additiveWorld");
          material.fog = false;
          const sprite = new THREE.Sprite(material);
          sprite.name = name;
          sprite.frustumCulled = false;
          tagTransparency(sprite, {
            profile: "additiveWorld",
            renderBand: RenderBand.WORLD_ADDITIVE_FRONT,
            ink: false
          });
          sprite.position.set(x, y, z);
          sprite.scale.setScalar(scale);
          scene.add(sprite);
          return sprite;
        };

        // Four cases in four screen quadrants — no sprite's glow radius may reach
        // another case's sample pixel (previous runs were contaminated twice).
        // A: free air in front of the wall (upper-right, clears both boxes)
        addSprite("front-of-wall", 2, 2, -20, 2);
        // B: behind the near "player" box, on the ray through the box
        // (at z=-8 the ray x = -5.25*8/14 = -3.0 → inside the box) — must be hidden
        addSprite("behind-player", -5.25, 0, -14, 2);
        // C: behind the far wall (lower-left, clear of everything) — must be hidden
        addSprite("behind-wall", -3, -3, -120, 6);
        // D: in front of box2 along box2's ray (at z=-8 the ray x = 1.6*8/4 = +3.2
        // = box2 centre) — visible over it
        addSprite("front-of-player", 1.6, 0, -4, 0.8);

        const rt = new THREE.RenderTarget(W, H, {
          type: THREE.UnsignedByteType,
          colorSpace: THREE.SRGBColorSpace,
          depthBuffer: true
        });
        renderer.setRenderTarget(rt);
        await renderer.renderAsync(scene, camera);
        const buf = await renderer.readRenderTargetPixelsAsync(rt, 0, 0, W, H);
        renderer.setRenderTarget(null);
        await renderer.renderAsync(scene, camera); // visible copy for eyeballing

        const project = (v) => {
          const p = v.clone().project(camera);
          return [Math.round((p.x * 0.5 + 0.5) * W), Math.round((p.y * 0.5 + 0.5) * H)];
        };
        const sample = (x, y) => {
          // `project` returns a bottom-up pixel Y (NDC +1 = top = y=H), but three's
          // WebGPU `readRenderTargetPixelsAsync` hands back rows TOP-DOWN (row 0 =
          // top). Flip to index the readback correctly. Without this, only the
          // off-center `front-of-wall` case mis-samples (it reads the mirrored row,
          // which lands on the wall) — the screen-centered cases are flip-invariant,
          // so the bug masqueraded as an isolated, flaky "front-of-wall MISSING".
          const row = H - 1 - y;
          const i = (row * W + x) * 4;
          return [buf[i], buf[i + 1], buf[i + 2]];
        };

        const cases = [
          { name: "front-of-wall", at: new THREE.Vector3(2, 2, -20), expectGlow: true },
          { name: "behind-player", at: new THREE.Vector3(-5.25, 0, -14), expectGlow: false },
          { name: "behind-wall", at: new THREE.Vector3(-3, -3, -120), expectGlow: false },
          { name: "front-of-player", at: new THREE.Vector3(1.6, 0, -4), expectGlow: true }
        ];
        const results = cases.map((c) => {
          const [x, y] = project(c.at);
          const [r, g, b] = sample(x, y);
          // glow = bright yellow-green additive spike; occluders are very dark
          const glowing = r > 60 && g > 60;
          return { ...c, at: undefined, px: [x, y], rgb: [r, g, b], glowing, pass: glowing === c.expectGlow };
        });
        window.__probeResult = {
          ok: results.every((r) => r.pass),
          reversedDepth: renderer.reversedDepthBuffer === true,
          backend: renderer.backend?.isWebGPUBackend ? "webgpu" : "webgl",
          results
        };
        console.log("PROBE_RESULT " + JSON.stringify(window.__probeResult, null, 1));
      }

      run().catch((err) => {
        window.__probeResult = { ok: false, error: String(err?.stack ?? err) };
        console.log("PROBE_RESULT " + JSON.stringify(window.__probeResult));
      });
    </script>
  </body>
</html>
